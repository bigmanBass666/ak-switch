# Prometheus configuration for Alvus
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'alvus'
    static_configs:
      - targets: ['alvus:3000']
    metrics_path: /metrics
    # Relabel to add a human-readable instance label
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'alvus'
