name: Go CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  unit:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Unit tests
        run: go test -tags=unit -count=1 -short ./internal/...

  integration:
    runs-on: windows-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Integration tests
        run: go test -tags=integration -count=1 -race ./

  e2e:
    runs-on: windows-latest
    needs: integration
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: E2E tests
        run: go test -tags=e2e -count=1 -timeout=5m -race ./

  docker:
    runs-on: ubuntu-latest
    needs: integration
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build .